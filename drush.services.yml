services:
  csc_admin_files.commands:
    class: Drupal\csc_admin\Commands\CscAdminCommands
    tags:
      - { name: drush.command }

  csc_admin_scanfiles.commands:
    class: Drupal\csc_admin\Commands\CscScanFilesCommands
    arguments:
      - '@entity_type.manager'
      - '@entity_field.manager'
      - '@logger.factory'
    tags:
      - { name: drush.command }

  csc_admin_stalefiles.commands:
    class: Drupal\csc_admin\Commands\CscStaleFilesCommands
    arguments:
      - '@database'
      - '@file_url_generator'
    tags:
      - { name: drush.command }
